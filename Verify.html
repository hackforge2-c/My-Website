<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Certificate | HackProof</title>
<link rel="icon" href="logo.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    background: #020617;
    font-family: 'Inter', sans-serif;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .verify-box {
    background: #020617;
    border: 1px solid #1e293b;
    padding: 40px;
    border-radius: 14px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 30px rgba(34,197,94,0.2);
  }

  h1 {
    color: #22c55e;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #000;
    color: white;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    display: none;
  }

  .valid {
    background: #052e16;
    border: 1px solid #22c55e;
  }

  .invalid {
    background: #3f0000;
    border: 1px solid red;
  }
</style>
</head>

<body>

<div class="verify-box">
  <h1>Verify Certificate</h1>
  <p>Enter Certificate ID</p>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<button onclick="verifyCertificate()">Verify</button>

<h3 id="result"></h3>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
function verifyCertificate() {
  const certId = document.getElementById("certId").value;

  db.collection("certificates").doc(certId).get()
    .then((doc) => {
      if (doc.exists) {
        const data = doc.data();
        document.getElementById("result").innerHTML =
          "Valid Certificate<br>" +
          "Name: " + data.username + "<br>" +
          "Course: " + data.course + "<br>" +
          "Date: " + data.date;
      } else {
        document.getElementById("result").innerHTML =
          "Invalid Certificate";
      }
    });
}
</script>

</body>
</html>
