<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HackProof Certificate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  background: #0f172a;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 30px;
}

/* ACTION BUTTONS (TOP CENTER) */
.actions {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

/* DOWNLOAD BUTTON */
.download-btn {
  background: linear-gradient(90deg, #a3ff00, #84cc16);
  color: black;
  border: none;
  padding: 14px 30px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(163,255,0,0.5);
}

/* SHARE BUTTON */
.share-btn {
  background: #0f172a;
  color: #94a3b8;
  border: 1px solid #334155;
  padding: 14px 30px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.share-btn:hover {
  border-color: #22c55e;
  color: #22c55e;
}

/* CERTIFICATE */
.certificate {
  width: 1000px;
  max-width: 95%;
  background: white;
  padding: 70px;
  border: 15px solid #1e293b;
  position: relative;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* ANIMATED WATERMARK */
.certificate::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 500px;
  height: 500px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.05;
  transform: translate(-50%, -50%);
  animation: floatLogo 12s ease-in-out infinite;
  pointer-events: none;
}

/* WATERMARK ANIMATION */
@keyframes floatLogo {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -48%) scale(1.05); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* INNER */
.inner-border {
  border: 2px solid #22c55e;
  padding: 40px;
}

/* TEXT */
.title {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

.name {
  text-align: center;
  font-size: 36px;
  color: #22c55e;
  margin: 25px 0;
  font-weight: 600;
}

.content {
  text-align: center;
  font-size: 18px;
  color: #374151;
}

/* SKILLS */
.skill-chip {
  display: inline-block;
  background: #22c55e;
  color: white;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  font-size: 12px;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  display: flex;
  justify-content: space-between;
}

.signature {
  text-align: center;
}

.signature-line {
  border-top: 1px solid black;
  width: 200px;
  margin-top: 40px;
}

.cert-id {
  text-align: center;
  margin-top: 20px;
  color: #555;
}

/* PRINT */
@media print {
  body {
    background: white !important;
    padding: 0;
  }

  .actions {
    display: none !important;
  }

  .certificate {
    max-width: 100%;
    border-radius: 0;
    box-shadow: none;
  }

  .certificate::before {
    opacity: 0.03 !important;
    animation: none;
  }
}
</style>
</head>

<body>

<!-- ACTION BUTTONS -->
<div class="actions">
  <button class="download-btn" onclick="window.print()">⬇ DOWNLOAD / PRINT</button>
  <button class="share-btn" onclick="shareCertificate()">🔗 SHARE CERTIFICATE</button>
</div>

<!-- CERTIFICATE -->
<div class="certificate">

<div class="inner-border">

<div class="logo">
  <img src="logo.png" width="70" onerror="this.style.display='none'">
</div>

<div class="title">Certificate of Completion</div>

<div class="content" style="margin-top:20px;">
  This is to Certify That
</div>

<div class="content">
  the following learner
</div>

<div class="name" id="studentName">HackForge Learner</div>

<div class="content" style="margin-top:10px;">
  has successfully completed the 
  <b id="courseName">Cybersecurity Training</b> program on the HackForge platform,
  demonstrating practical cybersecurity knowledge and ethical hacking skills.
</div>

<!-- ID + DATE -->
<div class="cert-id">
Certificate ID: <span id="certID"></span><br>
Date: <span id="date"></span>
</div>

<!-- SIGN -->
<div class="footer">
  <div class="signature">
    <div class="signature-line"></div>
    Instructor
  </div>

  <div class="signature">
    <div class="signature-line"></div>
    HackForge
  </div>
</div>

</div>
</div>

<script>
// PARAMS
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "HackForge Learner";
const course = params.get("course") || "Cybersecurity Training";

document.getElementById("studentName").innerText = name;
document.getElementById("courseName").innerText = course;

// CERT ID
const certID = "HP-" + name.replace(/\s/g,'').toUpperCase().slice(0,6) + "-" + Date.now().toString().slice(-5);
document.getElementById("certID").innerText = certID;

// DATE
const today = new Date();
document.getElementById("date").innerText = today.toLocaleDateString('en-US', {
  year: 'numeric',
  month: 'long',
  day: 'numeric'
});

// SHARE
function shareCertificate() {
  const url = window.location.href;
  navigator.clipboard.writeText(url);
  alert("✅ Certificate link copied!");
}
</script>

</body>
</html>
